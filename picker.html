  <style>
    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
      background: #f5f7fb;
      color: #1f2937;
    }

    .container {
      max-width: 1200px;
      margin: auto;
      padding: 30px 20px 100px;
    }

    h1 {
      font-size: 28px;
      margin-bottom: 10px;
    }

    .subtitle {
      color: #6b7280;
      margin-bottom: 25px;
    }

    .actions {
      display: flex;
      gap: 12px;
      margin-bottom: 20px;
    }

    button {
      border: none;
      border-radius: 8px;
      padding: 10px 18px;
      font-size: 14px;
      cursor: pointer;
      transition: 0.2s ease;
    }

    .primary {
      background: #2563eb;
      color: white;
    }

    .primary:hover {
      background: #1d4ed8;
    }

    .secondary {
      background: white;
      border: 1px solid #d1d5db;
    }

    .secondary:hover {
      background: #f9fafb;
    }

    #gallery {
      margin-top: 20px;
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(180px, 1fr));
      gap: 15px;
    }

    .photo-card {
      position: relative;
      border-radius: 12px;
      overflow: hidden;
      background: #e5e7eb;
      cursor: pointer;
      transition: transform 0.2s ease, box-shadow 0.2s ease;
    }

    .photo-card:hover {
      transform: translateY(-4px);
      box-shadow: 0 8px 20px rgba(0,0,0,0.1);
    }

    .photo-card img {
      width: 100%;
      height: 180px;
      object-fit: cover;
      display: block;
    }

    .photo-card.selected::after {
      content: "✓";
      position: absolute;
      top: 10px;
      right: 10px;
      background: #2563eb;
      color: white;
      font-size: 14px;
      padding: 5px 8px;
      border-radius: 50%;
    }

    .empty-state {
      text-align: center;
      margin-top: 60px;
      color: #6b7280;
    }

    .sticky-bar {
      position: fixed;
      bottom: 0;
      left: 0;
      width: 100%;
      background: white;
      border-top: 1px solid #e5e7eb;
      padding: 15px 20px;
      display: flex;
      justify-content: space-between;
      align-items: center;
    }

    .count {
      font-size: 14px;
      color: #374151;
    }

  </style>
</head>

<body>

  <div class="container">
    <h1>Select Photos</h1>
    <p class="subtitle">Pick your best moments and publish them to your album</p>

    <div class="actions">
      <button class="primary" onclick="startAuth()">Pick Photos</button>
      <button class="secondary" onclick="viewAlbum()">View Album</button>
    </div>

    <div id="gallery"></div>

    <div id="emptyState" class="empty-state">
      <p>No photos selected yet</p>
      <p>Click <strong>Pick Photos</strong> to get started</p>
    </div>
  </div>

  <div class="sticky-bar">

    <button class="primary" onclick="publishAlbum()">Publish Album</button>

  <script>
    const gallery = document.getElementById("gallery");
    const emptyState = document.getElementById("emptyState");
    const selectedCount = document.getElementById("selectedCount");

    let selectedPhotos = [];

    function renderPhotos(photos) {
      gallery.innerHTML = "";
      emptyState.style.display = photos.length ? "none" : "block";

      photos.forEach((url, index) => {
        const div = document.createElement("div");
        div.className = "photo-card";

        const img = document.createElement("img");
        img.src = url;

        div.appendChild(img);

        div.onclick = () => {
          div.classList.toggle("selected");

          if (selectedPhotos.includes(url)) {
            selectedPhotos = selectedPhotos.filter(p => p !== url);
          } else {
            selectedPhotos.push(url);
          }

          selectedCount.innerText = `${selectedPhotos.length} photos selected`;
        };

        gallery.appendChild(div);
      });
    }

  async function createPickerSession() {
    try {
      const res = await fetch("https://photospicker.googleapis.com/v1/sessions", {
        method: "POST",
        headers: { Authorization: "Bearer " + accessToken, "Content-Type": "application/json" },
        body: JSON.stringify({})
      });
      const session = await res.json();
      // log(session);
      sessionId = session.id;

      pickerWindow = window.open(session.pickerUri, "GooglePhotosPicker", "width=1000,height=800");
      pollUntilUserFinishes();
    } catch (err) {
      console.error(err);
      //log({ error: err.message });
    }
  }

  function pollUntilUserFinishes() {
    const interval = setInterval(async () => {
        try {
          const statusRes = await fetch(
            `https://photospicker.googleapis.com/v1/sessions/${sessionId}`,
            { headers: { Authorization: "Bearer " + accessToken } }
          );
          const statusData = await statusRes.json();
          // log(statusData);

          if (!statusData.mediaItemsSet) return;

          clearInterval(interval);
          pickerWindow.close();
          fetchSelectedPhotos();
        } catch (err) {
          console.error(err);
          // log({ error: "Error polling session", details: err.message });
          clearInterval(interval);
        }
      }, 2000);
  }

async function fetchSelectedPhotos() {
    try {
      const res = await await fetch(
          `https://photospicker.googleapis.com/v1/mediaItems?sessionId=${sessionId}`,
          { headers: { Authorization: "Bearer " + accessToken } }
        );
      console.log("Backend status:", res.status);
      const data = await res.json();
      //log(data);

      console.log("data", data);
      if (!data.mediaItems || data.mediaItems.length === 0) {
        alert("No photos selected");
        return;
      }

      console.log("data.mediaItems", data.mediaItems);
      // 🔹 Extract metadata only
      const metadata = data.mediaItems.map(item => ({
        id: item.id,
        baseUrl: item.mediaFile.baseUrl,
        filename: item.mediaFile.filename,
        mimeType: item.mediaFile.mimeType,
        accessToken: accessToken
      }));

      console.log("metadata", metadata);
      // 🔹 Send metadata to backend
      await fetch("/api/save-metadata", {
        method: "POST",
        headers: { "Content-Type": "application/json" ,
        Authorization: `Bearer ${appToken}`},
        body: JSON.stringify(metadata)
      });

      alert("Metadata stored successfully");

      loadGallery(accessToken);
    } catch (err) {
      console.error(err);
      //log({ error: "Error fetching photos", details: err.message });
    }
  }

  async function downloadPhotos(mediaItems, subdomain) {
  try {

      const res = await fetch("/api/download-photos", {
        method: "POST",
        headers: {
          "Content-Type": "application/json",
          Authorization: `Bearer ${appToken}`
        },
        body: JSON.stringify({
          subdomain: subdomain,
          mediaItems: mediaItems.data,
          accessToken: accessToken,
        }),
      });

      const data = await res.json();
      console.log("All photos downloaded");

  } catch (err) {
    console.error("Download error:", err);
  }
}



async function showGallery(photos, accessToken) {
  console.log("photos", photos);
  console.log("accessToken", accessToken);
  const gallery = document.getElementById("gallery");
  gallery.innerHTML = "";

  for (const item of photos) {
    const thumbUrl = item.baseUrl + "=w600-h600";

    // 🔹 Fetch thumbnail with Authorization header
    const thumbRes = await fetch(thumbUrl, {
      headers: { Authorization: `Bearer ${accessToken}` }
    });

    const thumbBlob = await thumbRes.blob();
    const thumbObjectUrl = URL.createObjectURL(thumbBlob);

    const div = document.createElement("div");
    div.className = "photo";

    const img = document.createElement("img");
    img.src = thumbObjectUrl;

    // 🔹 Fetch full image on click (also authenticated)
    img.onclick = async () => {
      const fullUrl = item.baseUrl + "=w2000-h2000";
      const fullRes = await fetch(fullUrl, {
        headers: { Authorization: `Bearer ${accessToken}` }
      });

      const fullBlob = await fullRes.blob();
      const fullObjectUrl = URL.createObjectURL(fullBlob);
      window.open(fullObjectUrl, "_blank");
    };

    div.appendChild(img);
    gallery.appendChild(div);
  }
}
